name: VidyaSetu Web CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: TypeScript validation
        run: npx tsc --noEmit
      - name: Production build
        run: npm run build
